<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #121212; padding: 40px; font-family: sans-serif; }
        .card { 
            background: #1e1e1e; padding: 20px; border-radius: 10px; 
            width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        
        .skeleton {
            background: #2a2a2a;
            background-image: linear-gradient(90deg, #2a2a2a 0px, #3a3a3a 40px, #2a2a2a 80px);
            background-size: 600px;
            animation: shimmer 1.5s infinite linear;
            border-radius: 4px;
        }

        .skel-avatar { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 15px; }
        .skel-title { width: 70%; height: 20px; margin-bottom: 10px; }
        .skel-text { width: 100%; height: 12px; margin-bottom: 8px; }
        .skel-text.short { width: 40%; }

        @keyframes shimmer {
            0% { background-position: -300px; }
            100% { background-position: 300px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="skeleton skel-avatar"></div>
        <div class="skeleton skel-title"></div>
        <div class="skeleton skel-text"></div>
        <div class="skeleton skel-text"></div>
        <div class="skeleton skel-text short"></div>
    </div>
</body>
</html>
