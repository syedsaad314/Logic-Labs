<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Monitor | Solar-Flare</title>
    <link rel="stylesheet" href="./styles/theme.css">
</head>
<body>
    <!-- The grid skeleton. Content will be injected over the next 3 days. -->
    <div class="dashboard-shell">
        < class="sidebar" id="nav-system">
            <div class="brand-logo">SYS_CORE</div>
            <!-- Navigation will go here -->
        <aside class="sidebar" id="nav-system">
    <div class="brand-logo">SYS_CORE</div>
    <nav class="nav-links">
        <div class="nav-item active">
            <span class="nav-icon">▤</span>
            <span class="nav-text">OVERVIEW</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">⚙</span>
            <span class="nav-text">RESOURCES</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">⚡</span>
            <span class="nav-text">NETWORK</span>
        </div>
        <div class="nav-item">
            <span class="nav-icon">⚠</span>
            <span class="nav-text">ALERTS</span>
        </div>
    </nav>
    <div class="sidebar-footer">
        <div class="user-chip">
            <div class="avatar">S</div>
            <span>ADMIN_SAAD</span>
        </div>
    </div>
</aside>
        
        <main class="data-arena">
            <header class="top-bar">
                <div class="system-status">
                    <div class="pulse-ring"></div>
                    <span>LIVE CONNECTION STATUS</span>
                </div>
            </header>
            
            <div class="widget-grid" id="main-monitor">
                <!-- Main Metric Card -->
            <div class="card metric-card">
            <div class="card-header">
            <span class="card-title">SERVER LOAD</span>
            <span class="status-dot healthy"></span>
            </div>
        <div class="card-body">
            <div class="main-value">24<span class="unit">%</span></div>
            <div class="trend positive">↘ -2.4% from last hour</div>
        </div>
    </div>

    <!-- Secondary Metric Card -->
    <div class="card metric-card">
        <div class="card-header">
            <span class="card-title">ACTIVE THREADS</span>
            <span class="status-dot warning"></span>
        </div>
        <div class="card-body">
            <div class="main-value highlight">1,402</div>
            <div class="trend negative">↗ +15% from last hour</div>
        </div>
    </div>

    <!-- Data Visualization Placeholder (Spans 2 columns) -->
    <div class="card chart-card">
        <div class="card-header">
            <span class="card-title">NETWORK THROUGHPUT</span>
        </div>
        <div class="chart-area">
            <!-- Tomorrow we will animate this with JS -->
            <div class="mock-chart-line"></div>
        </div>
    </div>
</div>
                <!-- Data cards and charts will be built here on Day 3 -->
            </div>
        </main>
    </div>
</body>
</html>
