<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #020202; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .holo-card {
            width: 320px; height: 180px;
            background: rgba(0, 242, 255, 0.03);
            border: 1px solid #00f2ff;
            clip-path: polygon(10% 0, 100% 0, 100% 80%, 90% 100%, 0 100%, 0 20%);
            position: relative; padding: 20px; color: #00f2ff;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .holo-card::after {
            content: ""; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 242, 255, 0.1), transparent);
            transform: rotate(45deg); animation: shimmer 4s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%) rotate(45deg); } 100% { transform: translateX(100%) rotate(45deg); } }
        .node-id { font-size: 0.8rem; letter-spacing: 2px; }
        .status { font-size: 1.5rem; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="holo-card">
        <div class="node-id">NODE_X_314</div>
        <div class="status">SYSTEM_ACTIVE</div>
        <p style="font-size: 11px; margin-top: 20px; color: rgba(0, 242, 255, 0.5);">
            ENCRYPTION: AES_256_GCM<br>
            THROUGHPUT: 1.4 GB/s
        </p>
    </div>
</body>
</html>
